apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          # Remplacé au déploiement par : DOCKER_USERNAME/plateforme-frontend:TAG
          image: FRONTEND_IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 4173
              name: http
          livenessProbe:
          env:
            - name: CHOKIDAR_USEPOLLING
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: CHOKIDAR_USEPOLLING
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: VITE_API_URL
          httpGet:
            path: /
            port: 4173
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      # FIX : suppression de imagePullSecrets ghcr-secret
      # Les images sont sur Docker Hub (public) → pas de secret nécessaire
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 4173
      targetPort: 4173
      name: http
  type: NodePort