apiVersion: v1
kind: Secret
metadata:
  name: plateforme-examen-secrets
  namespace: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
type: Opaque
stringData:
  # Ces valeurs sont injectées par le pipeline CI/CD
  POSTGRES_DB: "exam_db"
  POSTGRES_USER: "exam_user"
  # FIX: Utilisation du tag attendu par ton script sed
  POSTGRES_PASSWORD: "CHANGEME_postgres_password"
  SECRET_KEY: "CHANGEME_secret_key"
  JWT_SECRET_KEY: "CHANGEME_jwt_secret_key"