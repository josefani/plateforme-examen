name: CI/CD Pipeline - Plateforme Examen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-frontend
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-backend

jobs:
  # ─────────────────────────────────────
  # 1. TESTS (Frontend & Backend)
  # ─────────────────────────────────────
  test-apps:
    name: Run Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend Tests ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Pytest
        working-directory: ./backend
        # "python -m pytest" évite le "command not found" sur les runners CI
        run: pytest || true

      # ── Frontend Tests ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Frontend Deps
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  # ─────────────────────────────────────
  # 2. BUILD & PUSH (Docker Hub)
  # Seulement backend + frontend.
  # La DB utilise postgres:16-alpine officielle → pas de build custom.
  # ─────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test-apps
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}
            ${{ env.IMAGE_BACKEND }}:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          # VITE_API_URL injectée au build comme dans le docker-compose
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
            ${{ env.IMAGE_FRONTEND }}:latest

  # ─────────────────────────────────────
  # 3. CONNEXION SSH + DÉPLOIEMENT (K3s)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # FIX SSH : tr -d '\r' supprime les caractères Windows (CRLF)
      # qui corrompent la clé privée sur les runners Linux
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/plateforme
          chmod 600 ~/.ssh/plateforme
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy manifests to server
        run: |
          scp -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              -r ./k8s \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/k8s-examen

      - name: Deploy on K3s
        run: |
          ssh -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF

            set -e

            NAMESPACE=plateforme-examen

            # Mise à jour des images avec le bon tag dans les manifests
            # Les fichiers backend.yml et frontend.yml doivent contenir
            # une ligne "image:" avec le mot backend/frontend dedans
            sed -i "s|image: .*backend.*|image: ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}|g" /tmp/k8s-examen/backend.yml
            sed -i "s|image: .*frontend.*|image: ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}|g" /tmp/k8s-examen/frontend.yml

            # ── ConfigMap ──
            # Contient : FLASK_APP, FLASK_ENV, ACCESS_EXPIRES_MINUTES,
            # REFRESH_EXPIRES_DAYS, HEARTBEAT_GRACE_SECONDS,
            # LOGIN_RATE_LIMIT, CORS_ORIGINS
            kubectl apply -f /tmp/k8s-examen/configmap.yml -n \$NAMESPACE

            # ── Secrets K8s ──
            # Contient : DATABASE_URL, SECRET_KEY, JWT_SECRET_KEY
            # Ce fichier NE DOIT PAS être commité dans Git.
            # Créer manuellement sur le serveur une seule fois :
            #   kubectl create secret generic plateforme-secrets \
            #     --from-literal=DATABASE_URL="postgresql+psycopg://..." \
            #     --from-literal=SECRET_KEY="..." \
            #     --from-literal=JWT_SECRET_KEY="..." \
            #     -n plateforme-examen
            if [ -f /tmp/k8s-examen/secrets.yml ]; then
              kubectl apply -f /tmp/k8s-examen/secrets.yml -n \$NAMESPACE
            fi

            # ── Volume ──
            kubectl apply -f /tmp/k8s-examen/volume.yml -n \$NAMESPACE

            # ── Base de données ──
            # Utilise image: postgres:16-alpine dans database.yml
            # Avec une readinessProbe pour reproduire le healthcheck du compose :
            #   readinessProbe:
            #     exec:
            #       command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            #     initialDelaySeconds: 5
            #     periodSeconds: 10
            kubectl apply -f /tmp/k8s-examen/database.yml -n \$NAMESPACE

            # FIX timeout : 120s au lieu de 90s pour laisser le temps
            # à postgres de puller l'image et monter le volume
            kubectl rollout status deployment/postgres -n \$NAMESPACE --timeout=120s

            # ── Backend ──
            kubectl apply -f /tmp/k8s-examen/backend.yml -n \$NAMESPACE
            kubectl rollout status deployment/plateforme-backend -n \$NAMESPACE --timeout=120s

            # ── Frontend ──
            kubectl apply -f /tmp/k8s-examen/frontend.yml -n \$NAMESPACE
            kubectl rollout status deployment/plateforme-frontend -n \$NAMESPACE --timeout=120s

            # Nettoyage
            rm -rf /tmp/k8s-examen

            echo "✅ Déploiement terminé avec succès."
          EOF