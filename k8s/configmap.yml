apiVersion: v1
kind: Namespace
metadata:
  name: plateforme-examen
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: exam-config
  namespace: plateforme-examen
data:
  FLASK_APP: manage.py
  FLASK_ENV: production
  ACCESS_EXPIRES_MINUTES: "30"
  REFRESH_EXPIRES_DAYS: "7"
  HEARTBEAT_GRACE_SECONDS: "120"
  LOGIN_RATE_LIMIT: 5 per minute
  CORS_ORIGINS: __CORS_ORIGINS__
