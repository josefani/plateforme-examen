name: CI/CD Pipeline - Plateforme Examen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-frontend
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-backend

jobs:
  # ─────────────────────────────────────
  # 1. TESTS (Frontend & Backend)
  # ─────────────────────────────────────
  test-apps:
    name: Run Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend Tests ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Pytest
        working-directory: ./backend
        run: pytest || true

      # ── Frontend Tests ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Frontend Deps
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test-apps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # Plus besoin de la section "with: args:" ici !

  # ─────────────────────────────────────
  # 3. BUILD & PUSH (Docker Hub)
  # ─────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test-apps
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}
            ${{ env.IMAGE_BACKEND }}:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
            ${{ env.IMAGE_FRONTEND }}:latest

  # ─────────────────────────────────────
  # 4. CONNEXION SSH + DÉPLOIEMENT (K3s)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # tr -d '\r' supprime les caractères Windows (CRLF) qui corrompent la clé
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/plateforme
          chmod 600 ~/.ssh/plateforme
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy manifests to server
        run: |
          # On récupère la variable depuis GitHub
          TARGET_DIR="${{ vars.K8S_WORKDIR }}"

          # On prépare le terrain sur le serveur
          ssh -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "sudo rm -rf $TARGET_DIR && sudo mkdir -p $TARGET_DIR && sudo chown ${{ secrets.SERVER_USER }} $TARGET_DIR"
          
          # On copie les fichiers vers le chemin défini dans GitHub
          scp -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              -r ./k8s/* \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$TARGET_DIR

      - name: Deploy on K3s
        run: |
          ssh -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF

            set -e
            NAMESPACE=plateforme-examen

            # ── Injection des vraies valeurs dans secrets.yml ──
            # Les valeurs CHANGEME_* sont remplacées par les secrets GitHub
            sed -i "s|CHANGEME_postgres_password|${{ secrets.POSTGRES_PASSWORD }}|g" /tmp/k8s-examen/secrets.yml
            sed -i "s|CHANGEME_secret_key|${{ secrets.SECRET_KEY }}|g"               /tmp/k8s-examen/secrets.yml
            sed -i "s|CHANGEME_jwt_secret_key|${{ secrets.JWT_SECRET_KEY }}|g"       /tmp/k8s-examen/secrets.yml

            # ── Injection de CORS_ORIGINS dans configmap.yml ──
            sed -i "s|CHANGEME_cors_origins|${{ secrets.CORS_ORIGINS }}|g" /tmp/k8s-examen/configmap.yml

            # ── Injection des images Docker Hub dans les manifests ──
            # Les fichiers backend.yml et frontend.yml contiennent BACKEND_IMAGE_TAG / FRONTEND_IMAGE_TAG
            sed -i "s|BACKEND_IMAGE_TAG|${{ env.IMAGE_BACKEND }}:${{ env.TAG }}|g"   /tmp/k8s-examen/backend.yml
            sed -i "s|FRONTEND_IMAGE_TAG|${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}|g" /tmp/k8s-examen/frontend.yml

            # ── Namespace ──
            kubectl apply -f /tmp/k8s-examen/configmap.yml

            # ── ConfigMap ──
            kubectl apply -f /tmp/k8s-examen/configmap.yml -n \$NAMESPACE

            # ── Secrets ──
            kubectl apply -f /tmp/k8s-examen/secrets.yml -n \$NAMESPACE

            # ── Volume (PVC postgres-pvc) ──
            # Doit être créé avant le déploiement de postgres
            kubectl apply -f /tmp/k8s-examen/volume.yml -n \$NAMESPACE

            # ── Base de données ──
            kubectl apply -f /tmp/k8s-examen/database.yml -n \$NAMESPACE

            # Attendre que postgres soit ready (readinessProbe pg_isready)
            # timeout 120s pour laisser le temps de puller l'image + monter le PVC
            kubectl rollout status deployment/postgres -n \$NAMESPACE --timeout=120s

            # ── Backend ──
            kubectl apply -f /tmp/k8s-examen/backend.yml -n \$NAMESPACE
            # FIX : nom réel du deployment = "backend" (pas "plateforme-backend")
            kubectl rollout status deployment/backend -n \$NAMESPACE --timeout=20000s

            # ── Frontend ──
            kubectl apply -f /tmp/k8s-examen/frontend.yml -n \$NAMESPACE
            # FIX : nom réel du deployment = "frontend" (pas "plateforme-frontend")
            kubectl rollout status deployment/frontend -n \$NAMESPACE --timeout=120s

            # Nettoyage
            #rm -rf /tmp/k8s-examen

            echo "✅ Déploiement terminé avec succès."
          EOF
  # ─────────────────────────────────────
  # 5. ANALYSE DE SÉCURITÉ DYNAMIQUE (DAST)
  # ─────────────────────────────────────
  security-scan-zap:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy  #Attend que l'app soit déployée
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # L'URL publique de ton application (ton IP GCP)
          target: 'http://34.10.229.174'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: 'Alerte de Sécurité : Faille détectée par ZAP'
          fail_action: false