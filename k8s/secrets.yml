apiVersion: v1
kind: Secret
metadata:
  name: plateforme-examen-secrets
  namespace: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
type: Opaque
# Les valeurs CHANGEME_* sont remplacées automatiquement au déploiement
# par les secrets GitHub Actions via sed dans le pipeline CI/CD.
# Ne jamais mettre de vraies valeurs ici — ce fichier est versionné dans Git.
stringData:
  POSTGRES_DB: "exam_db"
  POSTGRES_USER: "exam_user"
  POSTGRES_PASSWORD: "CHANGEME_postgres_password"
  SECRET_KEY: "CHANGEME_secret_key"
  JWT_SECRET_KEY: "CHANGEME_jwt_secret_key"