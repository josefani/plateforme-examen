name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: plateforme-examen-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/plateforme-examen-backend
  FRONTEND_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/plateforme-examen-frontend
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'plateforme-examen' }}
  REMOTE_APP_DIR: ${{ vars.REMOTE_APP_DIR || '/opt/plateforme-examen' }}
  FRONTEND_PORT: "4173"
  BACKEND_PORT: "5000"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run build

      - name: Check backend syntax
        working-directory: backend
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall .

      - name: Check Docker Compose config
        run: docker compose config --quiet

      - name: Build Docker images
        run: docker compose build

  build_and_push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs:
      - quality

    outputs:
      backend_image: ${{ steps.export.outputs.backend_image }}
      frontend_image: ${{ steps.export.outputs.frontend_image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      - name: Extract frontend metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            VITE_API_URL=/api
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}

      - name: Export image refs
        id: export
        run: |
          echo "backend_image=${BACKEND_IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND_IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Remote k3s
    runs-on: ubuntu-latest
    needs:
      - quality
      - build_and_push
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      REMOTE_APP_DIR: ${{ vars.REMOTE_APP_DIR || '/opt/plateforme-examen' }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check deployment secrets
        run: |
          set -euo pipefail
          for name in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY GHCR_USERNAME GHCR_TOKEN POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD SECRET_KEY JWT_SECRET_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: ${name}"
              exit 1
            fi
          done

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Trust deployment server
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Render Kubernetes manifests
        env:
          BACKEND_IMAGE: ${{ needs.build_and_push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build_and_push.outputs.frontend_image }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS || 'http://localhost,http://127.0.0.1' }}
        run: |
          set -euo pipefail
          cp -R k8s rendered-k8s
          DATABASE_URL="postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"

          esc() {
            printf '%s' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          ESCAPED_NAMESPACE="$(esc "$K8S_NAMESPACE")"
          ESCAPED_BACKEND_IMAGE="$(esc "$BACKEND_IMAGE")"
          ESCAPED_FRONTEND_IMAGE="$(esc "$FRONTEND_IMAGE")"
          ESCAPED_POSTGRES_DB="$(esc "$POSTGRES_DB")"
          ESCAPED_POSTGRES_USER="$(esc "$POSTGRES_USER")"
          ESCAPED_POSTGRES_PASSWORD="$(esc "$POSTGRES_PASSWORD")"
          ESCAPED_DATABASE_URL="$(esc "$DATABASE_URL")"
          ESCAPED_SECRET_KEY="$(esc "$SECRET_KEY")"
          ESCAPED_JWT_SECRET_KEY="$(esc "$JWT_SECRET_KEY")"
          ESCAPED_CORS_ORIGINS="$(esc "$CORS_ORIGINS")"

          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|plateforme-examen|${ESCAPED_NAMESPACE}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|ghcr.io/replace-me/plateforme-examen-backend:latest|${ESCAPED_BACKEND_IMAGE}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|ghcr.io/replace-me/plateforme-examen-frontend:latest|${ESCAPED_FRONTEND_IMAGE}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|__POSTGRES_DB__|${ESCAPED_POSTGRES_DB}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|__POSTGRES_USER__|${ESCAPED_POSTGRES_USER}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|__POSTGRES_PASSWORD__|${ESCAPED_POSTGRES_PASSWORD}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|__DATABASE_URL__|${ESCAPED_DATABASE_URL}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|__SECRET_KEY__|${ESCAPED_SECRET_KEY}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|__JWT_SECRET_KEY__|${ESCAPED_JWT_SECRET_KEY}|g"
          find rendered-k8s -type f -name '*.yml' -print0 | xargs -0 sed -i "s|__CORS_ORIGINS__|${ESCAPED_CORS_ORIGINS}|g"

          cat > rendered-k8s/backend-migrate-job.yml <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: backend-migrate-seed
            namespace: ${K8S_NAMESPACE}
          spec:
            backoffLimit: 2
            template:
              metadata:
                labels:
                  app: backend-migrate-seed
              spec:
                restartPolicy: Never
                imagePullSecrets:
                  - name: ghcr-creds
                initContainers:
                  - name: wait-for-postgres
                    image: postgres:16-alpine
                    command:
                      - sh
                      - -c
                      - until pg_isready -h postgres -p 5432 -U "\$POSTGRES_USER" -d "\$POSTGRES_DB"; do sleep 2; done
                    env:
                      - name: POSTGRES_DB
                        valueFrom:
                          secretKeyRef:
                            name: exam-secrets
                            key: POSTGRES_DB
                      - name: POSTGRES_USER
                        valueFrom:
                          secretKeyRef:
                            name: exam-secrets
                            key: POSTGRES_USER
                containers:
                  - name: backend-migrate-seed
                    image: ${BACKEND_IMAGE}
                    imagePullPolicy: Always
                    command:
                      - sh
                      - -c
                      - flask db upgrade && flask seed-demo
                    envFrom:
                      - configMapRef:
                          name: exam-config
                      - secretRef:
                          name: exam-secrets
          EOF

      - name: Prepare remote workdir
        run: |
          set -euo pipefail
          remote_workdir="$(printf '%q' "$REMOTE_APP_DIR")"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p $remote_workdir/rendered-k8s"

      - name: Clean remote manifest directory
        run: |
          set -euo pipefail
          remote_workdir="$(printf '%q' "$REMOTE_APP_DIR")"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -rf $remote_workdir/rendered-k8s/*"

      - name: Copy rendered manifests
        run: |
          set -euo pipefail
          scp -P "$SSH_PORT" -r rendered-k8s/* "$SSH_USER@$SSH_HOST:$REMOTE_APP_DIR/rendered-k8s/"

      - name: Deploy on remote server
        run: |
          set -euo pipefail

          remote_workdir="$(printf '%q' "$REMOTE_APP_DIR")"
          remote_namespace="$(printf '%q' "$K8S_NAMESPACE")"
          remote_ghcr_user="$(printf '%q' "$GHCR_USERNAME")"
          remote_ghcr_token="$(printf '%q' "$GHCR_TOKEN")"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            cd $remote_workdir/rendered-k8s

            if command -v k3s >/dev/null 2>&1; then
              KUBECTL='k3s kubectl'
            else
              KUBECTL='kubectl'
            fi

            \$KUBECTL create namespace $remote_namespace --dry-run=client -o yaml | \$KUBECTL apply -f -
            \$KUBECTL -n $remote_namespace create secret docker-registry ghcr-creds \
              --docker-server=ghcr.io \
              --docker-username=$remote_ghcr_user \
              --docker-password=$remote_ghcr_token \
              --dry-run=client -o yaml | \$KUBECTL apply -f -

            \$KUBECTL apply -f configmap.yml
            \$KUBECTL apply -f secrets.yml
            \$KUBECTL apply -f volume.yml
            \$KUBECTL apply -f database.yml

            \$KUBECTL rollout status deployment/postgres -n $remote_namespace --timeout=180s

            \$KUBECTL delete job backend-migrate-seed -n $remote_namespace --ignore-not-found=true
            \$KUBECTL apply -f backend-migrate-job.yml
            \$KUBECTL wait --for=condition=complete job/backend-migrate-seed -n $remote_namespace --timeout=180s

            \$KUBECTL apply -f backend.yml
            \$KUBECTL apply -f frontend.yml

            \$KUBECTL rollout status deployment/backend -n $remote_namespace --timeout=180s
            \$KUBECTL rollout status deployment/frontend -n $remote_namespace --timeout=180s
          "
