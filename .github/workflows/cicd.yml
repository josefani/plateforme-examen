name: CI/CD — Plateforme Examen

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/frontend

jobs:
  # ────────────────────────────────────────────────
  # 1. BUILD & PUSH des images Docker
  # ────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.slug.outputs.tag }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Générer le tag SHA court
        id: slug
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.slug.outputs.tag }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.slug.outputs.tag }}
            ${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────
  # 2. DEPLOY sur Kubernetes (main uniquement)
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Créer/mettre à jour le secret GHCR
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --namespace=plateforme-examen \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Applique tous les manifests du dossier k8s/
      - name: Appliquer les manifests K8s
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/volume.yaml
          kubectl apply -f k8s/database.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml

      # Mise à jour des images avec le tag SHA exact
      - name: Mettre à jour les images
        run: |
          TAG=${{ needs.build-and-push.outputs.image-tag }}

          kubectl set image deployment/backend \
            backend=${{ env.IMAGE_BACKEND }}:${TAG} \
            -n plateforme-examen

          kubectl set image deployment/frontend \
            frontend=${{ env.IMAGE_FRONTEND }}:${TAG} \
            -n plateforme-examen

      - name: Vérifier le rollout backend
        run: |
          kubectl rollout status deployment/backend \
            -n plateforme-examen --timeout=120s

      - name: Vérifier le rollout frontend
        run: |
          kubectl rollout status deployment/frontend \
            -n plateforme-examen --timeout=120s

      - name: Résumé du déploiement
        run: |
          echo "✅ Déploiement terminé — tag : ${{ needs.build-and-push.outputs.image-tag }}"
          echo "────────────────────────────────"
          kubectl get pods -n plateforme-examen
          echo "────────────────────────────────"
          kubectl get services -n plateforme-examen