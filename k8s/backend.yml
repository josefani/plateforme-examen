apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 5432; do
                echo "En attente de PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL est prêt."
      containers:
        - name: backend
          image: ghcr.io/GITHUB_ORG/GITHUB_REPO/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: FLASK_APP
              valueFrom:
                configMapKeyRef:
                  name: plateforme-examen-config
                  key: FLASK_APP
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: plateforme-examen-config
                  key: FLASK_ENV
            - name: ACCESS_EXPIRES_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: plateforme-examen-config
                  key: ACCESS_EXPIRES_MINUTES
            - name: REFRESH_EXPIRES_DAYS
              valueFrom:
                configMapKeyRef:
                  name: plateforme-examen-config
                  key: REFRESH_EXPIRES_DAYS
            - name: HEARTBEAT_GRACE_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: plateforme-examen-config
                  key: HEARTBEAT_GRACE_SECONDS
            - name: LOGIN_RATE_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: plateforme-examen-config
                  key: LOGIN_RATE_LIMIT
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: plateforme-examen-config
                  key: CORS_ORIGINS
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: plateforme-examen-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plateforme-examen-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: plateforme-examen-secrets
                  key: POSTGRES_DB
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plateforme-examen-secrets
                  key: SECRET_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plateforme-examen-secrets
                  key: JWT_SECRET_KEY
            - name: DATABASE_URL
              value: "postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@db:5432/$(POSTGRES_DB)"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
    app.kubernetes.io/component: backend
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP