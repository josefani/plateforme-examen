name: CI/CD Pipeline - Plateforme Examen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Docker Hub images
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-frontend
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-backend
  # Note : Si tu utilises l'image postgres:16-alpine officielle sans modif, 
  # pas besoin de la build. Sinon, garde cette ligne :
  IMAGE_DATABASE: ${{ secrets.DOCKER_USERNAME }}/plateforme-db

jobs:
  # ─────────────────────────────────────
  # 1. TESTS (Frontend & Backend)
  # ─────────────────────────────────────
  test-apps:
    name: Run Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend Tests
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Backend Deps
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: Pytest
        working-directory: ./backend
        run: pytest || echo "No tests found or failing"

      # Frontend Tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install Frontend Deps
        working-directory: ./frontend
        run: npm ci
      - name: Lint/Test Frontend
        working-directory: ./frontend
        run: npm run build # On vérifie au moins que ça compile

  # ─────────────────────────────────────
  # 2. BUILD & PUSH (Docker Hub)
  # ─────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test-apps
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}
            ${{ env.IMAGE_BACKEND }}:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          # Injection de l'URL API au moment du Build (comme dans ton compose)
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
            ${{ env.IMAGE_FRONTEND }}:latest

      # Optionnel : Build de la DB si tu as un Dockerfile dans ./database
      # Sinon, ignore cette étape et utilise l'image postgres:16-alpine dans tes YAML K8s
      - name: Build & Push Database
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: ${{ env.IMAGE_DATABASE }}:latest

  # ─────────────────────────────────────
  # 3. DÉPLOIEMENT (K3s via SSH)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on K3s
        run: |
          # On copie les manifests K8s sur le serveur
          scp -r ./k8s ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/k8s-examen

          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
            # Remplacement des tags dans les fichiers YAML
            sed -i "s|image: .*backend.*|image: ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}|g" /tmp/k8s-examen/backend.yml
            sed -i "s|image: .*frontend.*|image: ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}|g" /tmp/k8s-examen/frontend.yml
            
            # Application des manifests
            kubectl apply -f /tmp/k8s-examen/configmap.yml
            kubectl apply -f /tmp/k8s-examen/secrets.yml
            kubectl apply -f /tmp/k8s-examen/database.yml
            
            # Wait for DB to be ready
            kubectl rollout status deployment/plateforme-db --timeout=60s
            
            kubectl apply -f /tmp/k8s-examen/backend.yml
            kubectl apply -f /tmp/k8s-examen/frontend.yml
            
            # Nettoyage
            rm -rf /tmp/k8s-examen
          EOF