name: CI/CD Pipeline - Plateforme Examen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-frontend
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/plateforme-backend

jobs:
  # ─────────────────────────────────────────────
  # 1. TESTS QUALITÉ
  # ─────────────────────────────────────────────
  test-apps:
    name: Run Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Backend Deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Pytest
        working-directory: ./backend
        run: pytest || true

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Frontend Deps
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

  # ─────────────────────────────────────────────
  # 2. SONARQUBE
  # ─────────────────────────────────────────────
  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test-apps
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────────────
  # 3. BUILD & PUSH
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test-apps
    if: github.ref == 'refs/heads/main'
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_BACKEND }}:cache,mode=max
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}
            ${{ env.IMAGE_BACKEND }}:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
            ${{ env.IMAGE_FRONTEND }}:latest

  # ─────────────────────────────────────────────
  # 4. DÉPLOIEMENT K3s
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: [build-push, sonarqube-analysis]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${{ needs.build-push.outputs.tag }}" >> $GITHUB_ENV

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/plateforme
          chmod 600 ~/.ssh/plateforme
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Préparer les manifests en local
        run: |
          # Copie dans un dossier temporaire pour éviter de modifier les fichiers du repo
          cp -r ./k8s /tmp/k8s-deploy

          # ── Injection des secrets dans secrets.yml ──
          sed -i "s|CHANGEME_postgres_password|${{ secrets.POSTGRES_PASSWORD }}|g" /tmp/k8s-deploy/secrets.yml
          sed -i "s|CHANGEME_secret_key|${{ secrets.SECRET_KEY }}|g"               /tmp/k8s-deploy/secrets.yml
          sed -i "s|CHANGEME_jwt_secret_key|${{ secrets.JWT_SECRET_KEY }}|g"       /tmp/k8s-deploy/secrets.yml

          # ── DATABASE_URL dans secrets.yml ──
          sed -i "s|CHANGEME_database_url|postgresql+psycopg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}|g" /tmp/k8s-deploy/secrets.yml

          # ── Injection CORS dans configmap.yml ──
          sed -i "s|CHANGEME_cors_origins|${{ secrets.CORS_ORIGINS }}|g" /tmp/k8s-deploy/configmap.yml

          # ── Injection des images ──
          sed -i "s|BACKEND_IMAGE_TAG|${{ env.IMAGE_BACKEND }}:${{ env.TAG }}|g"   /tmp/k8s-deploy/backend.yml
          sed -i "s|FRONTEND_IMAGE_TAG|${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}|g" /tmp/k8s-deploy/frontend.yml

      - name: Copier les manifests sur le serveur
        run: |
          TARGET_DIR="${{ vars.K8S_WORKDIR }}"
          ssh -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "sudo rm -rf $TARGET_DIR && sudo mkdir -p $TARGET_DIR && sudo chown ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} $TARGET_DIR"

          scp -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              -r /tmp/k8s-deploy/* \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$TARGET_DIR

      - name: Déployer sur K3s
        run: |
          TARGET_DIR="${{ vars.K8S_WORKDIR }}"

          ssh -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            set -e
            NAMESPACE=plateforme-examen
            WORK_DIR="${{ vars.K8S_WORKDIR }}"

            echo "📁 Répertoire de travail : $WORK_DIR"

            # ── Namespace (idempotent) ──
            kubectl apply -f $WORK_DIR/namespace.yml

            # ── Secrets & ConfigMap ──
            kubectl apply -f $WORK_DIR/secrets.yml -n $NAMESPACE
            kubectl apply -f $WORK_DIR/configmap.yml -n $NAMESPACE

            # ── Volume ──
            kubectl apply -f $WORK_DIR/volume.yml -n $NAMESPACE

            # ── Base de données ──
            kubectl apply -f $WORK_DIR/database.yml -n $NAMESPACE
            kubectl rollout status deployment/postgres -n $NAMESPACE --timeout=120s

            # ── Backend ──
            kubectl apply -f $WORK_DIR/backend.yml -n $NAMESPACE
            kubectl rollout status deployment/backend -n $NAMESPACE --timeout=120s

            # ── Frontend ──
            kubectl apply -f $WORK_DIR/frontend.yml -n $NAMESPACE
            kubectl rollout status deployment/frontend -n $NAMESPACE --timeout=120s

            echo "✅ Déploiement ${{ env.TAG }} terminé avec succès."
          EOF

      - name: Vérifier les pods
        if: always()
        run: |
          ssh -i ~/.ssh/plateforme \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "kubectl get pods -n plateforme-examen -o wide"

  # ─────────────────────────────────────────────
  # 5. SCAN SÉCURITÉ OWASP ZAP
  # ─────────────────────────────────────────────
  security-scan-zap:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Attendre que le service soit prêt
        run: sleep 30

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://plateforme-examen.duckdns.org'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: 'Alerte de Sécurité : Faille détectée par ZAP'
          fail_action: false