apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: plateforme-examen
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: plateforme-examen
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: frontend
          image: ghcr.io/replace-me/plateforme-examen-frontend:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - sh
            - -c
            - npm install && npm run dev
          env:
            - name: CHOKIDAR_USEPOLLING
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: CHOKIDAR_USEPOLLING
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: VITE_API_URL
          ports:
            - containerPort: 5173
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
