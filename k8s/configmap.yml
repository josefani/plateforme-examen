apiVersion: v1
kind: Namespace
metadata:
  name: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
    app.kubernetes.io/managed-by: github-actions
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plateforme-examen-config
  namespace: plateforme-examen
  labels:
    app.kubernetes.io/name: plateforme-examen
data:
  FLASK_APP: "manage.py"
  FLASK_ENV: "production"
  ACCESS_EXPIRES_MINUTES: "30"
  REFRESH_EXPIRES_DAYS: "7"
  HEARTBEAT_GRACE_SECONDS: "120"
  LOGIN_RATE_LIMIT: "5 per minute"
  # Remplacé au déploiement par le secret GitHub CORS_ORIGINS
  # Ex: https://ton-domaine.com ou http://<IP_SERVEUR>:<NODE_PORT>
  CORS_ORIGINS: "CHANGEME_cors_origins"
  VITE_API_URL: 'backend-service:default:svc.cluster.local:5000'
  CHOKIDAR_USEPOLLING: 'true'