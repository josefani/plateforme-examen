name: CI/CD — Plateforme Examen (SSH Deploy)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/frontend

jobs:
  # ────────────────────────────────────────────────
  # 1. BUILD & PUSH des images Docker
  # ────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.slug.outputs.tag }}
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Générer le tag SHA court
        id: slug
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.slug.outputs.tag }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.slug.outputs.tag }}
            ${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────
  # 2. DEPLOY via SSH (main uniquement)
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy to Server via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # On se déplace dans le dossier du projet sur le serveur
            cd /path/to/your/project/k8s 
            
            # Récupération du tag généré par le job précédent
            TAG=${{ needs.build-and-push.outputs.image-tag }}
            
            # Mise à jour des manifests (si nécessaire via git pull)
            git pull origin main

            # Connexion au registre (si nécessaire sur le serveur)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Application des manifests
            kubectl apply -f configmap.yaml
            kubectl apply -f secrets.yaml
            kubectl apply -f volume.yaml
            kubectl apply -f database.yaml
            kubectl apply -f backend.yaml
            kubectl apply -f frontend.yaml

            # Mise à jour des images
            kubectl set image deployment/backend backend=${{ env.IMAGE_BACKEND }}:${TAG} -n plateforme-examen
            kubectl set image deployment/frontend frontend=${{ env.IMAGE_FRONTEND }}:${TAG} -n plateforme-examen

            # Vérification du déploiement
            kubectl rollout status deployment/backend -n plateforme-examen --timeout=120s
            kubectl rollout status deployment/frontend -n plateforme-examen --timeout=120s