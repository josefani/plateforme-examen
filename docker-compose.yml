services:
  db:
    image: postgres:16-alpine
    container_name: plateforme_examen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exam_db}
      POSTGRES_USER: ${POSTGRES_USER:-exam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exam_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plateforme_examen_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plateforme_examen_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: manage.py
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-exam_user}:${POSTGRES_PASSWORD:-exam_password}@db:5432/${POSTGRES_DB:-exam_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret-key}
      ACCESS_EXPIRES_MINUTES: ${ACCESS_EXPIRES_MINUTES:-30}
      REFRESH_EXPIRES_DAYS: ${REFRESH_EXPIRES_DAYS:-7}
      HEARTBEAT_GRACE_SECONDS: ${HEARTBEAT_GRACE_SECONDS:-120}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5 per minute}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://localhost:5173}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5000}:5000"
    networks:
      - plateforme_examen_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: plateforme_examen_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4173}:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-backend:5000}
    networks:
      - plateforme_examen_network

volumes:
  postgres_data:

networks:
  plateforme_examen_network:
    driver: bridge
